<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Offline — ErrorFix Pro</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0b1020; color: #e8edf7;
  min-height: 100vh; display: grid; place-items: center;
  text-align: center; padding: 2rem;
}
.wrap { max-width: 420px; }
.icon {
  width: 72px; height: 72px; margin: 0 auto 1.5rem;
  border-radius: 16px;
  background: linear-gradient(135deg, #3b82f6, #06b6d4);
  display: grid; place-items: center;
  font-size: 32px; font-weight: 800; color: #fff;
  box-shadow: 0 8px 24px rgba(59,130,246,0.35);
}
h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
p { color: #8b97b8; font-size: 1rem; line-height: 1.6; margin-bottom: 1.5rem; }
button {
  background: #3b82f6; color: #fff; border: none;
  padding: 0.75rem 1.5rem; border-radius: 8px;
  font-size: 0.9rem; font-weight: 600; cursor: pointer;
  transition: background 0.2s;
}
button:hover { background: #2563eb; }
</style>
</head>
<body>
<div class="wrap">
<div class="icon">EF</div>
<h1>You're Offline</h1>
<p>ErrorFix Pro can't reach the internet right now. Cached pages may still be available — try reloading once your connection returns.</p>
<button onclick="location.reload()">Try Again</button>
</div>
</body>
</html>
